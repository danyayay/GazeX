experiment:
  train: false
  random_seed: 42
  random_seeds:
    - 42
  ckpt_path: logs/indiv_time_o40_p40_s4/sqlite_final/20250919_053434_LSTMse/checkpoints/best_model.pth

data:
  data_dir: data/indiv_time_o40_p40_s4
  traj_format: rel_delta
  base_motion:
    - traj
    - vel
  target:
    - traj
  use_headeye:
    - eye_in_walking
  use_pod:
    - pod_dist
  use_expt: true
  use_person: null
  aux_format: raw
  is_normalize_ts: true
  is_normalize_aux: false

model:
  type: multimodallstm
  params:
    # output distribution
    diagonal_cov: false

    # decoder
    dense_hidden_dim: 226
    dense_n_layers: 1

    # motion encoder (always active)
    motion_hidden_dim: 192
    motion_n_layers: 3

    # head-eye encoder (type: lstm)
    headeye_hidden_dim: 43
    headeye_n_layers: 1
    headeye_encoder_type: lstm

    # pod encoder
    pod_hidden_dim: 116
    pod_n_layers: 2
    pod_encoder_type: lstm
    pod_comb: max

    # embeddings (disabled)
    is_embed_ts: false
    is_embed_aux: false

    # regularisation
    with_reg: false
    dropout: 0

training:
  n_epochs: 100
  batch_size: 38
  optimizer:
    lr: 0.002786817066695457
  scheduler:
    lr_milestones:
      - 15
      - 35
      - 60
    gamma: 0.2

inference:
  is_deter: false
  is_infer_mu: false
  num_samples: 20

logging:
  is_save_config_file: true
