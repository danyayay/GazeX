experiment:
  train: false
  random_seed: 42
  random_seeds:
  - 42
  ckpt_path: logs/indiv_time_o40_p40_s4/sqlite_final/20250918_113122_LSTMse/checkpoints/best_model.pth

data:
  data_dir: data/indiv_time_o40_p40_s4
  traj_format: rel_delta
  base_motion:
  - traj
  - vel
  target:
  - traj
  use_headeye:
  - eye_vislet
  use_pod:
  - pod_dist
  use_expt: false
  use_person: null
  aux_format: raw
  is_normalize_ts: true
  is_normalize_aux: false
  ts_names:
    - loc_x
    - loc_y
    - vel_x
    - vel_y
    - eye_sinyaw
    - eye_cosyaw
    - dist_pedleader_x
    - dist_pedleader_y
    - dist_pedfollower_x
    - dist_pedfollower_y

model:
  type: multimodallstm
  params:
    diagonal_cov: false

    dense_hidden_dim: 186
    dense_n_layers: 2

    motion_hidden_dim: 125
    motion_n_layers: 3

    headeye_hidden_dim: 51
    headeye_n_layers: 2
    headeye_encoder_type: lstm

    pod_hidden_dim: 74
    pod_n_layers: 1
    pod_encoder_type: lstm
    pod_comb: max

    is_embed_ts: false
    is_embed_aux: false

    with_reg: false
    dropout: 0.0
    
training:
  n_epochs: 80
  batch_size: 37
  optimizer:
    lr: 0.002576827207650694
  scheduler:
    lr_milestones:
    - 15
    - 35
    - 60
    gamma: 0.2
    
inference:
  is_deter: false
  is_infer_mu: false
  num_samples: 20

logging:
  is_save_config_file: true
